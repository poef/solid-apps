<!doctype html>
<meta charset="utf-8">
<title>People</title>
<style>
	:root {
		--ds-primary: oklch(0.4866 0.1142 255.31);
		--ds-primary-contrast: white;
    }
	html,body {
		height: 100%;
	}
</style>
<body class="ds-darkmode-auto ds-panels-container">
<header>
	<simply-render rel="solid-drawer"></simply-render>
</header>
<main class="ds-panels-list-details">
	<heading class="ds-panels-heading ds-sticky-top" style="--ds-top: 0.5em;">
		<h1 class="ds-panels-title ds-sticky-left" style="--ds-left: -0.2em;">People</h1>
	</heading>
	<div class="ds-panels-panes">
		<div class="ds-panels-pane ds-panels-list">
			<simply-render rel="solid-contacts"></simply-render>
			<simply-render rel="solid-contacts-filter"></simply-render>
		</div>
		<div class="ds-panels-pane ds-panels-details">
			<simply-render rel="solid-contacts-contact"></simply-render>
		</div>
	</div>
</main>
<script src="assets/js/contacts.js"></script>
</body>
