<!doctype html>
<meta charset="utf-8">
<title>Solid Login</title>
<style>
	:root {
		--ds-primary: oklch(0.4866 0.1142 255.31);
		--ds-primary-contrast: white;
		--ds-support: var(--ds-grey-70);
		--ds-support-contrast: white;
		--ds-dialog-radius: 0;
		--ds-font-weight: 400;
		/* https://thegoodcolors.com/full?l=62&c=23&d=12&cb=1&cbt=deuteranomaly */
		--solid-palette-1: oklch(0.62 0.23 262);
		--solid-palette-2: oklch(0.62 0.23 206);
		--solid-palette-3: oklch(0.62 0.23 138);
		--solid-palette-4: oklch(0.62 0.23 66);
		--solid-palette-5: oklch(0.62 0.23 330);
		--ds-primary: #0086dd;
		--ds-support: #9e3cdc;
    }
	html,body {
		height: 100%;
	}
	.colorbox {
		width: 3em;
		aspect-ratio: 1;
		background-color: var(--color);
		display: inline-flex;
		color: white;
		margin-bottom: 5px;
	}
	.solid-darkbg {
		opacity: 0;
		transition: opacity 0.3s linear;
	}
 	body.ds-darkmode {
 		background-color: #0E0E0E;
 		.solid-darkbg {
			opacity: 1;
		}
 	}
	@media (prefers-color-scheme: dark) {
    	body.ds-darkmode-auto {
    		background-color: #0E0E0E;
			.solid-darkbg {
				opacity: 1;
			}
    	}
    }
	body {
		background-color: #e4eaf4;
		background-image: url('assets/img/bg2.jpg');
		background-repeat: no-repeat;
		background-position: center center;
		background-size: cover;
	}
	body, .solid-dialog, .ds-form-buttons { 
		transition: background-color 0.2s linear;
 	}
 	main {
 		background-color: rgba(0,0,0,0.3);
 	}
 	.ds-background-image {
 		z-index: 0;
 	}
 	.solid-darkmode-toggle .ds-button {
 		margin: 0;
 	}
</style>
<body class="ds-darkmode-auto ds-panels-container">
<img class="ds-background-image solid-darkbg" src="assets/img/bg3.jpg">
<nav class="solid-drawer-position">
	<label class="ds-align-right ds-dropdown solid-drawer solid-darkmode-toggle">
		<button class="ds-button ds-button-naked" data-simply-command="darkmodeToggle" data-simply-state="alt">
			<svg class="ds-icon ds-icon-feather" data-simply-state="default">
			    <use xlink:href="assets/icons/feather-sprite.svg#moon"></use>
			</svg>
			<svg class="ds-icon ds-icon-feather" data-simply-state="alt">
			    <use xlink:href="assets/icons/feather-sprite.svg#sun"></use>
			</svg>
		</button>
	</label>
</nav>
<main class="ds-panels-panes ds-panels-center" data-flow-field="page">
	<template data-flow-match="login">
		<div class="ds-dialog solid-dialog ds-space-inside">
			<h1>Login</h1>
			<form class="solid-form" data-simply-command="login">
				<label>
					E-mail
					<input type="email" name="email" autofocus>
				</label>
				<label>
					Password
					<input type="password" name="password">
					<div class="ds-form-help solid-small">
						<svg class="solid-contacts-filter-icon ds-icon ds-icon-feather">
							    <use xlink:href="assets/icons/feather-sprite.svg#alert-triangle"></use>
							</svg> Login failed. 
						<a href="#reset-password" class="ds-align-right">
							<svg class="solid-contacts-filter-icon ds-icon ds-icon-feather">
							    <use xlink:href="assets/icons/feather-sprite.svg#external-link"></use>
							</svg>
							Reset your password
						</a>
					</div>
				</label>
				<div class="ds-form-buttons">
					<button class="ds-button ds-button-primary">Login</button>
					<div class="ds-align-right">
						<a href="#register" style="--ds-icon-height: var(--ds-button-line-height); line-height: var(--ds-button-line-height);">
						<span>&#8230; or create a new account</span></a>
					</div>
				</div>
			</form>
		</div>
	</template>
	<template data-flow-match="register">
		<div class="ds-dialog solid-dialog ds-space-inside">
			<h1>Register</h1>
			<form class="solid-form" data-simply-command="register">
				<label>
					E-mail
					<input type="email" name="email" autofocus>
				</label>
				<label>
					Choose a Password
					<input type="password" name="password1" data-simply-command="passwordStrength" data-simply-immediate=true autofocus>
					<div class="ds-form-help"><span data-flow-field="passwordStrength">
						<template data-flow-match="weak">
							<span>
								<svg class="solid-contacts-filter-icon ds-icon ds-icon-feather">
							    	<use xlink:href="assets/icons/feather-sprite.svg#alert-triangle"></use>
								</svg>
								Password is too weak
							</span>
						</template>
						<template data-flow-match="average">
							<span>
								<svg class="solid-contacts-filter-icon ds-icon ds-icon-feather">
							    	<use xlink:href="assets/icons/feather-sprite.svg#alert-circle"></use>
								</svg>
								Password is average
							</span>
						</template>
						<template data-flow-match="strong">
							<span>
								<svg class="solid-contacts-filter-icon ds-icon ds-icon-feather">
							    	<use xlink:href="assets/icons/feather-sprite.svg#thumbs-up"></use>
								</svg>
								Password is strong!
							</span>
						</template>
					</span></div>
				</label>
				<label>
					Confirm your Password
					<input type="password" name="password2" data-simply-command="passwordMatches">
					<div class="ds-form-help"><span data-flow-field="passwordMatches">
						<template data-flow-match="false">
							<span>
								<svg class="solid-contacts-filter-icon ds-icon ds-icon-feather">
							    	<use xlink:href="assets/icons/feather-sprite.svg#external-link"></use>
								</svg>
								Passwords do not match
							</span>
						</template>
					</span></div>
				</label>
				<div class="ds-form-buttons">
					<button class="ds-button ds-button-primary">Register</button>
					<div class="ds-align-right">
						<a href="#login" style="--ds-icon-height: var(--ds-button-line-height); line-height: var(--ds-button-line-height);">
						<span>&#8230; or login with your account</span></a>
					</div>
				</div>
			</form>
		</div>
	</template>
	<template data-flow-match="confirm">
		<div class="ds-dialog solid-dialog ds-space-inside">
			<h1>Confirm E-mail</h1>
			<form class="solid-form" data-simply-command="confirmRegistration">
				<label>
					Enter your code
					<input type="text" name="code" autofocus>
				</label>
				<div class="ds-form-buttons">
					<button class="ds-button ds-button-primary">Confirm</button>
					<a class="ds-button ds-button-support" href="#home">Cancel</a>
				</div>
			</form>
		</div>
	</template>
	<template data-flow-match="resetsend">
		<div class="ds-dialog solid-dialog ds-space-inside">
			<h1>Reset your password</h1>
			<form class="solid-form">
				<p>Follow the instructions in your E-mail to complete the password reset.</p>
				<div class="ds-form-buttons">
					<a class="ds-button ds-button-support" href="#home">Home</a>
				</div>
			</form>
		</div>
	</template>
	<template data-flow-match="reset">
		<div class="ds-dialog solid-dialog ds-space-inside">
			<h1>Reset your password</h1>
			<form class="solid-form" data-simply-command="reset">
				<p>Enter your e-mail address and press Reset to receive a link that will allow you to reset your password.</p>
				<label>
					E-mail
					<input type="email" name="email" autofocus>
				</label>
				<div class="ds-form-buttons">
					<button class="ds-button ds-button-primary">Reset</button>
					<a class="ds-button ds-button-support" href="#home">Cancel</a>
				</div>
			</form>
		</div>
	</template>
	<template data-flow-match="about">
		<div class="ds-dialog solid-dialog ds-space-inside">
			<h1>About</h1>
			<form class="solid-form solid-about ds-margin-up" data-simply-command="confirmRegistration">
				<p>This server is an identity provider compatible with <a href="https://openid.net/developers/how-connect-works/" target="_blank">OpenID Connect</a> and <a href="https://solidproject.org/" target="_blank">Solid</a>.</p>
				<div class="solid-small">
					<p>This software is open source and makes use of:</p>
					<ul class="ds-margin-up">
						<li><a href="https://github.com/acodercat/php-jwk-to-pem?a" target="_blank">codercat/jwk-to-pem</a></li>
						<li><a href="https://github.com/defuse/php-encryption?a" target="_blank">defuse/php-encryption</a></li>
						<li><a href="https://github.com/lcobucci/jwt" target="_blank">lcobucci/jwt</a></li>
						<li><a href="https://flysystem.thephpleague.com/docs/" target="_blank">league/flysystem</a></li>
						<li><a href="https://oauth2.thephpleague.com/" target="_blank">league/oauth2-server</a></li>
						<li><a href="https://pdsinterop.org/php-solid-server/" target="_blank">pdsinterop/php-solid-server</a></li>
					</ul>
					<p>This project was funded through the <a href="https://nlnet.nl/core" target="_blank">NGI0 Core</a> and <a href="https://nlnet.nl/discovery" target="_blank">NGI0 Discovery Funds</a>, established by <a href="https://nlnet.nl/" target="_blank">NLnet</a> with financial support from the European Commission's <a href="https://ngi.eu/" target="_blank">Next Generation Internet</a> programme.</p>
				</div>
				<div class="ds-form-buttons">
					<a class="ds-button ds-button-support" href="#login">Login</a>
					<a class="ds-button ds-button-support" href="#register">Register</a>
				</div>
			</form>
		</div>
	</template>
	<template data-flow-match="home">
		<div class="ds-dialog solid-dialog ds-space-inside">
			<h1>Solid Identity Server</h1>
			<ul>
				<li><a href="#login">Login</a></li>
				<li><a href="#register">Register</a></li>
				<li><a href="#deleteme">Delete my account</a></li>
				<li><a href="#about">About</a></li>
				<li><a href="#colors">Colors</a></li>
			</ul>
		</div>
	</template>
	<template data-flow-match="deleteme">
		<div class="ds-dialog solid-dialog ds-space-inside">
			<h1>Delete my account</h1>
			<p>n.y.i.</p>
		</div>
	</template>
	<template data-flow-match="colors">
		<div class="ds-dialog solid-dialog ds-space-inside">
			<h1>Colors</h1>
			<ul data-flow-list="colors">
				<template>
					<li data-flow-map=":value">
						<template>
							<div class="colorbox" data-flow-field=":value" data-flow-transform="color">text</div>
						</template>
					</li>
				</template>
			</ul>
		</div>
	</template>
</main>

<script src="assets/js/idp.js"></script>
</body>
